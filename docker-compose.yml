---
services:
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      API_TITLE: "RAG Hybrid Search API"
      API_VERSION: "1.0.0"
      DEBUG: "true"

      # LLM (Ollama running on host)
      LLM_BASE_URL: "http://host.docker.internal:11434"
      LLM_MODEL: "phi3.5:3.8b"
      LLM_TEMPERATURE: "0.6"

      # Embeddings
      EMBEDDING_MODEL: "nomic-embed-text"
      EMBEDDING_DIMENSION: "768"

      # Search
      HYBRID_SEARCH_ALPHA: "0.6"
      TOP_K_RESULTS: "7"

      # Document processing
      CHUNK_SIZE: "800"
      CHUNK_OVERLAP: "200"
      USE_CODE_AWARE_SPLITTING: "true"
      USE_ENHANCED_BM25: "true"
      USE_DEVOPS_PROMPTS: "true"

      # Phase 3 optimizations
      USE_FAISS: "true"
      USE_INVERTED_BM25: "true"
      FAISS_USE_HNSW: "true"
      USE_RERANKER: "true"

      # Cache
      USE_QUERY_RESPONSE_CACHE: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge
