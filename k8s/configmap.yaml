---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-app-config
  namespace: rag-hybrid-search
  labels:
    app: rag-hybrid-search
data:
  API_TITLE: "RAG Hybrid Search API"
  API_VERSION: "1.0.0"
  DEBUG: "false"

  LLM_BASE_URL: "http://192.168.65.254:11434"
  LLM_MODEL: "phi3.5:3.8b"
  LLM_TEMPERATURE: "0.6"

  EMBEDDING_MODEL: "nomic-embed-text"
  EMBEDDING_DIMENSION: "768"

  CHUNK_SIZE: "800"
  CHUNK_OVERLAP: "200"
  USE_CODE_AWARE_SPLITTING: "true"

  TOP_K_RESULTS: "7"
  HYBRID_SEARCH_ALPHA: "0.6"
  FUSION_METHOD: "rrf"
  USE_SEARCH_HEURISTICS: "true"

  USE_FAISS: "true"
  FAISS_USE_HNSW: "true"
  FAISS_EF_SEARCH: "50"

  USE_DEVOPS_PROMPTS: "true"

  USE_RERANKER: "true"
  USE_CONTEXTUAL_PREFIX: "true"

  USE_QUERY_RESPONSE_CACHE: "true"
  CACHE_MAX_SIZE: "1000"
  CACHE_SIMILARITY_THRESHOLD: "0.95"
  CACHE_TTL_SECONDS: "3600"
