---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-app-config
  namespace: rag-hybrid-search
  labels:
    app: rag-hybrid-search
data:
  # API Configuration
  API_TITLE: "RAG Hybrid Search API"
  API_VERSION: "1.0.0"
  DEBUG: "false"

  # LLM Configuration (Ollama on host - better resource usage)
  LLM_BASE_URL: "http://host.minikube.internal:11434"
  LLM_MODEL: "phi3.5:3.8b"
  LLM_TEMPERATURE: "0.6"

  # Embeddings Configuration
  EMBEDDING_MODEL: "nomic-embed-text"
  EMBEDDING_DIMENSION: "768"

  # Search Configuration
  HYBRID_SEARCH_ALPHA: "0.6"
  TOP_K_RESULTS: "7"

  # Document Processing
  CHUNK_SIZE: "800"
  CHUNK_OVERLAP: "200"
  USE_CODE_AWARE_SPLITTING: "true"
  USE_ENHANCED_BM25: "true"

  # K8s/Cilium specific
  USE_DEVOPS_PROMPTS: "true"

  # FAISS Configuration
  USE_FAISS: "true"
  USE_INVERTED_BM25: "true"
  FAISS_USE_HNSW: "true"
  FAISS_M: "32"
  FAISS_EF_CONSTRUCTION: "200"
  FAISS_EF_SEARCH: "50"
